id: rn-06
category: gesture-handling
description: Android back gesture not handled in custom navigation flow
code: |
  function CheckoutFlow({ onComplete, onAbort }) {
    const [step, setStep] = useState(1);

    const nextStep = () => setStep(s => Math.min(s + 1, 3));
    const prevStep = () => setStep(s => Math.max(s - 1, 1));

    return (
      <View>
        <StepIndicator current={step} />
        {step === 1 && <CartReview onNext={nextStep} />}
        {step === 2 && <PaymentForm onNext={nextStep} onBack={prevStep} />}
        {step === 3 && <Confirmation onComplete={onComplete} />}
      </View>
    );
  }
issues:
  - severity: MAJOR
    category: gesture-handling
    description: "Android hardware back button is not handled; pressing back during checkout will pop the entire checkout screen instead of going to the previous step, losing form data"
    evidence: "function CheckoutFlow({ onComplete, onAbort }) {"
    expected_checks: [gesture-handling, operability]
  - severity: MINOR
    category: operability
    description: "no confirmation dialog on abort; user can accidentally discard cart state by pressing back"
    evidence: "const prevStep = () => setStep(s => Math.max(s - 1, 1));"
    expected_checks: [operability]
