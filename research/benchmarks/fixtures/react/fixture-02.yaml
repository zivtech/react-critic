id: react-02
category: render-behavior
description: expensive computation in render path without memoization
code: |
  function DataGrid({ rows, filters }) {
    const visibleRows = rows.filter(r => {
      return filters.every(f => {
        const val = getNestedValue(r, f.path); // O(depth) traversal
        return matchFilter(val, f); // regex compile on every call
      });
    });

    return (
      <table>
        {visibleRows.map((row, i) => (
          <tr key={i}>
            {row.cells.map(c => <td>{c}</td>)}
          </tr>
        ))}
      </table>
    );
  }
