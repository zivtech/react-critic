id: next-02
category: cache-correctness
description: overly aggressive no-store on every fetch disabling PPR
code: |
  // app/products/page.tsx
  export default async function ProductsPage() {
    const [products, categories, featuredBanner] = await Promise.all([
      fetch('/api/products', { cache: 'no-store' }),
      fetch('/api/categories', { cache: 'no-store' }),
      fetch('/api/banner/featured', { cache: 'no-store' }),
    ]);
    // ...render
  }
issues:
  - severity: MAJOR
    category: cache-correctness
    description: "cache: 'no-store' on all fetches disables PPR; categories and banner are stable data and should use revalidate or force-cache; every page visit re-fetches all three even if data hasn't changed"
    evidence: "fetch('/api/categories', { cache: 'no-store' })"
    expected_checks: [cache-correctness, ppr-correctness]
  - severity: MINOR
    category: cache-correctness
    description: "no granular revalidate tags; cache invalidation requires a full page re-build rather than targeted revalidatePath/revalidateTag"
    evidence: "fetch('/api/products', { cache: 'no-store' })"
    expected_checks: [cache-correctness]
